<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Banking System</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .header-stats {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #transaction-counter {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-left: 10px;
        }

        button {
            display: block;
            margin: 0 auto 40px auto;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        button:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Container for the parsed elements */
        #parsed-data {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            display: none; /* Hidden until data arrives */
        }

        .info-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--primary-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .info-box:hover {
            transform: translateY(-2px);
        }

        .info-box strong {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .info-box span {
            font-size: 1.15rem;
            font-weight: 500;
            word-break: break-word;
        }

        /* Container for the raw JSON */
        #json-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 25px;
            border-radius: 12px;
            overflow-x: auto;
            display: none; /* Hidden until data arrives */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .json-title {
            color: #9cdcfe;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        #result {
            margin: 0;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>Mock Banking Transaction System</h1>

    <div class="header-stats">
        Total Transactions:
        <span id="transaction-counter">{{ transaction_count }}</span>
    </div>

    <button onclick="createTransaction()">
        Create Transaction
    </button>

    <div id="parsed-data"></div>
    
    <div id="json-container">
        <h3 class="json-title">Raw JSON Payload</h3>
        <pre id="result"></pre>
    </div>

    <script>
        async function createTransaction() {
            const response = await fetch("/create_transaction");
            const data = await response.json();
            
            // Update the counter on the page dynamically
            document.getElementById("transaction-counter").innerText = data.total_count;
            
            const txn = data.transaction;
            
            // Build the grid of parsed elements
            const parsedContainer = document.getElementById("parsed-data");
            parsedContainer.style.display = "grid";
            
            // Format the amount as currency
            const formatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: txn.currency
            });

            parsedContainer.innerHTML = `
                <div class="info-box"><strong>Transaction ID</strong> <span>${txn.transaction_id}</span></div>
                <div class="info-box"><strong>Customer Name</strong> <span>${txn.customer_name}</span></div>
                <div class="info-box"><strong>Amount</strong> <span>${formatter.format(txn.amount)}</span></div>
                <div class="info-box"><strong>Status</strong> 
                    <span style="color: ${txn.status === 'SUCCESS' ? '#16a34a' : txn.status === 'FAILED' ? '#dc2626' : '#ca8a04'}">
                        ${txn.status}
                    </span>
                </div>
                <div class="info-box"><strong>Timestamp</strong> <span>${new Date(txn.timestamp).toLocaleString()}</span></div>
            `;
            
            // Show the raw JSON below
            const jsonContainer = document.getElementById("json-container");
            jsonContainer.style.display = "block";
            document.getElementById("result").innerHTML = JSON.stringify(
                data,
                null,
                4
            );
        }
    </script>

</body>
</html>
